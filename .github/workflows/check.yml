name: Bauhaus Verfügbarkeit prüfen

on:
  schedule:
    # alle 10 Minuten (real meist 10-15 Min wegen GitHub-Last)
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # manuelles Auslösen über die Actions-Oberfläche (zum Testen)

# erlaubt dem Job, den geänderten state.json zurück ins Repo zu committen
permissions:
  contents: write

# kein paralleler Lauf, damit state.json nicht kollidiert
concurrency:
  group: bauhaus-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verfügbarkeit prüfen
        id: check
        env:
          PRODUCT_URL: "https://www.obi.de/p/8620890/midea-mobile-split-klimaanlage-portasplit?preselectedKp=true"
          PRODUCT_NAME: "Midea Mobile Split-Klimaanlage PortaSplit"
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: bash check.sh

      - name: Zustandsänderung speichern
        if: steps.check.outputs.STATE_CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "state: Verfügbarkeit aktualisiert [skip ci]"
          git push
