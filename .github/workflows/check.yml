name: Bauhaus Verfügbarkeit prüfen

on:
  schedule:
    # alle 30 Minuten – schont das Gratis-Kontingent der Scraping-API.
    # Bei größerem API-Plan auf "*/10 * * * *" o.ä. ändern.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # manuelles Auslösen über die Actions-Oberfläche (zum Testen)

# erlaubt dem Job, den geänderten state.json zurück ins Repo zu committen
permissions:
  contents: write

# kein paralleler Lauf, damit state.json nicht kollidiert
concurrency:
  group: bauhaus-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verfügbarkeit prüfen
        id: check
        env:
          PRODUCT_URL: "https://www.bauhaus.info/klimaanlagen/midea-klimasplitgeraet-portasplit/p/31934233"
          PRODUCT_NAME: "Midea Klimasplitgerät PortaSplit"
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          # Anbieter umschaltbar: scraperapi (Standard) | scrapingbee | scrapingant
          SCRAPER_PROVIDER: ${{ vars.SCRAPER_PROVIDER || 'scraperapi' }}
        run: bash check.sh

      - name: Zustandsänderung speichern
        if: steps.check.outputs.STATE_CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "state: Verfügbarkeit aktualisiert [skip ci]"
          git push
