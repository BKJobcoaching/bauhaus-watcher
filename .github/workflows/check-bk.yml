name: braucheklima – alle Baumärkte prüfen

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bk-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verfügbarkeit prüfen (braucheklima)
        id: check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: bash check-bk.sh

      - name: Zustand speichern
        if: steps.check.outputs.STATE_CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state-bk.txt
          git commit -m "state-bk: Online-Verfügbarkeit aktualisiert [skip ci]"
          git push
