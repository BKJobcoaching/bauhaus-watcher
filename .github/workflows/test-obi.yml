name: TEST OBI erreichbar (Datacenter)

# Einmal-Test: kommt ein GitHub-Runner (Rechenzentrums-IP) an OBI vorbei?
# Wenn ja -> wir können OBI ohne Scraper kostenlos überwachen.
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: OBI abrufen
        run: |
          UA='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
          URL='https://www.obi.de/p/8620890/midea-mobile-split-klimaanlage-portasplit?preselectedKp=true'
          code=$(curl -sS -o obi.html -w '%{http_code}' -A "$UA" \
                 -H 'Accept-Language: de-DE,de;q=0.9' \
                 -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' \
                 "$URL" || echo 000)
          echo "HTTP-Status: $code   (Größe: $(wc -c < obi.html) Bytes)"
          echo "--- gefundene Signale ---"
          grep -oiE '"availability"[[:space:]]*:[[:space:]]*"[^"]*"|"price"[[:space:]]*:[[:space:]]*"?[0-9.,]+|Sicherheitsprüfung|Just a moment|captcha|Attention Required' obi.html | sort | uniq -c | head
          echo "-------------------------"
          if [ "$code" = "200" ] && grep -qiE '"availability"' obi.html; then
            echo "✅ GitHub kommt durch! OBI lässt sich ohne Scraper überwachen."
          else
            echo "❌ Geblockt/404 – auch OBI sperrt Rechenzentrums-IPs. Dann bleibt nur der PC-Weg."
          fi
