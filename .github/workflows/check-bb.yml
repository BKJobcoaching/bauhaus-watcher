name: bestell.bar prüfen (Redundanz)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bb-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verfügbarkeit prüfen (bestell.bar)
        id: check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: bash check-bb.sh

      - name: Zustand speichern
        if: steps.check.outputs.STATE_CHANGED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state-bb.txt
          git commit -m "state-bb: bestell.bar-Verfügbarkeit aktualisiert [skip ci]"
          git push
